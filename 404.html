<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Página no encontrada - teologia.media">
<meta name="theme-color" content="#faf7f0">
<meta name="robots" content="noindex">
<meta property="og:title" content="Página no encontrada - teologia.media">
<meta property="og:description" content="La página que buscas no existe o fue movida.">
<meta property="og:url" content="https://teologia.media/404">
<meta property="og:type" content="website">
<meta property="og:site_name" content="teologia.media">
<meta property="og:locale" content="es_MX">
<title>404 - teologia.media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root{--bg:#faf7f0;--text:#2a2a3a;--muted:#6b6b7a;--accent:#a68a54;--line:#d9d2bf;--max:680px;--serif:'EB Garamond',Garamond,'Times New Roman',serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:20px;line-height:1.6;padding:2rem 1.5rem;min-height:100vh;display:flex;flex-direction:column;}
  @media(max-width:719px){body{font-size:18px;}}
  header.top{max-width:var(--max);margin:0 auto 3rem;width:100%;font-family:var(--sans);font-size:.9rem;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:baseline;}
  header.top a.brand{color:var(--text);text-decoration:none;font-family:var(--serif);font-size:1.1rem;}
  .brand{display:inline-flex;align-items:center;gap:.5rem;}
  .brand-icon{width:18px;height:18px;display:inline-block;vertical-align:middle;}
  header.top nav{display:flex;gap:1.5rem;}
  header.top nav a{color:var(--muted);text-decoration:none;}
  header.top nav a:hover{color:var(--accent);}
  main{max-width:var(--max);margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:3rem 0;}
  .code{font-family:var(--sans);font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
  h1{font-size:2.4rem;font-weight:400;line-height:1.2;color:var(--text);margin-bottom:1.5rem;letter-spacing:-.01em;}
  .lead{font-size:1.15rem;color:var(--muted);margin-bottom:2rem;}
  .actions{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;font-family:var(--sans);font-size:.95rem;margin-top:1rem;}
  .actions a{color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:.6rem 1.25rem;}
  .actions a:hover{background:var(--accent);color:var(--bg);}
  footer{max-width:var(--max);margin:4rem auto 0;width:100%;padding-top:2rem;border-top:1px solid var(--line);font-family:var(--sans);font-size:.85rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
  footer a{color:var(--muted);text-decoration:none;}
  footer a:hover{color:var(--accent);}
  footer nav{display:flex;gap:1.25rem;flex-wrap:wrap;}
  header.top{position:relative;}
  header.top .burger{display:none;background:none;border:0;cursor:pointer;padding:.5rem;width:44px;height:44px;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  header.top .burger-line{display:block;width:22px;height:2px;background:var(--text);transition:transform .3s ease,opacity .3s ease;}
  @media(max-width:767px){
    header.top{align-items:center;}
    header.top .burger{display:flex;}
    header.top nav{position:absolute;top:calc(100% + .25rem);left:0;right:0;flex-direction:column;gap:0;background:#fffdf7;border-top:1px solid var(--line);border-bottom:1px solid var(--line);box-shadow:0 6px 16px rgba(0,0,0,.06);max-height:0;overflow:hidden;overscroll-behavior:contain;transition:max-height .3s ease;z-index:10;}
    header.top.open nav{max-height:420px;}
    header.top nav a{padding:1rem 1.5rem;border-bottom:1px solid var(--line);font-size:1rem;min-height:44px;display:flex;align-items:center;}
    header.top nav a:last-child{border-bottom:0;}
    header.top.open .burger-line:nth-child(1){transform:translateY(6px) rotate(45deg);}
    header.top.open .burger-line:nth-child(2){opacity:0;}
    header.top.open .burger-line:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
  }
</style>
</head>
<body>

<header class="top">
  <a href="/" class="brand"><img src="/favicon.svg" alt="" aria-hidden="true" class="brand-icon">teologia.media</a>
  <button class="burger" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="primary-nav">
    <span class="burger-line"></span>
    <span class="burger-line"></span>
    <span class="burger-line"></span>
  </button>
  <nav id="primary-nav" role="navigation">
    <a href="/camino-de-dios">Camino de Dios</a>
    <a href="/about">Nosotros</a>
  </nav>
</header>

<main>
  <p class="code">Error 404</p>
  <h1>Esta página no existe.</h1>
  <p class="lead">La dirección que buscas no se encuentra aquí, o fue movida.</p>
  <div class="actions">
    <a href="/">Ir al inicio</a>
    <a href="mailto:contacto@teologia.studio">Escribirnos</a>
  </div>
</main>

<footer>
  <div>© 2026 teologia.media</div>
  <nav>
    <a href="/about">Nosotros</a>
    <a href="/privacy">Privacidad</a>
    <a href="/terms">Términos</a>
  </nav>
</footer>

<script>
(function(){
  var header = document.querySelector('header.top');
  if(!header) return;
  var burger = header.querySelector('.burger');
  var nav = header.querySelector('nav');
  if(!burger || !nav) return;

  function sync(){
    if(window.innerWidth >= 768){
      nav.removeAttribute('aria-hidden');
      if(header.classList.contains('open')) close();
    } else {
      nav.setAttribute('aria-hidden', header.classList.contains('open') ? 'false' : 'true');
    }
  }
  function open(){
    header.classList.add('open');
    burger.setAttribute('aria-expanded', 'true');
    burger.setAttribute('aria-label', 'Cerrar menú');
    nav.setAttribute('aria-hidden', 'false');
  }
  function close(){
    header.classList.remove('open');
    burger.setAttribute('aria-expanded', 'false');
    burger.setAttribute('aria-label', 'Abrir menú');
    if(window.innerWidth < 768) nav.setAttribute('aria-hidden', 'true');
  }

  burger.addEventListener('click', function(e){
    e.stopPropagation();
    header.classList.contains('open') ? close() : open();
  });
  nav.addEventListener('click', function(e){
    if(e.target.tagName === 'A') close();
  });
  document.addEventListener('click', function(e){
    if(header.classList.contains('open') && !header.contains(e.target)) close();
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && header.classList.contains('open')){
      close();
      burger.focus();
    }
  });
  var resizeTimer;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(sync, 100);
  });

  sync();
})();
</script>
</body>
</html>
