  .lead{font-size:1.15rem;color:var(--muted);margin-bottom:2rem;}
  .actions{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;font-family:var(--sans);font-size:.95rem;margin-top:1rem;}
  .actions a{color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:.6rem 1.25rem;}
  .actions a:hover{background:var(--accent);color:var(--bg);}
  footer{max-width:var(--max);margin:4rem auto 0;width:100%;padding-top:2rem;border-top:1px solid var(--line);font-family:var(--sans);font-size:.85rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
  footer a{color:var(--muted);text-decoration:none;}
  footer a:hover{color:var(--accent);}
